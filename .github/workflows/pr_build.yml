name: PR Build Check

on:
  pull_request:
  workflow_dispatch: # Allows manual triggering if needed

jobs:
  build-check:
    name: Verify Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run Build
        run: yarn build
        env:
            CI: true
            NODE_ENV: production
